name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        working-directory: cli/hxtp-cli
        run: go mod download

      - name: Build binaries
        working-directory: cli/hxtp-cli
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Generate Manifest
        working-directory: cli/hxtp-cli
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat <<EOF > dist/manifest.json
          {
            "latest": "$VERSION",
            "channels": {
              "stable": "$VERSION"
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/hxtp-cli/dist/*.tar.gz
            cli/hxtp-cli/dist/*.zip
            cli/hxtp-cli/dist/manifest.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
